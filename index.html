<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bragado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">

 <div class="menu-btn" onclick="abrirMenu()">
  <svg width="70" height="70" viewBox="0 0 24 24" stroke="black" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</div>
<img src="bragadologobonito.PNG" class="logo">

<div class="cart-btn">
  <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
    <path d="M6 6h15l-1.5 9h-13z"/>
    <circle cx="9" cy="20" r="1"/>
    <circle cx="18" cy="20" r="1"/>
  </svg>
</div>

<header>
<div id="overlay" class="overlay" onclick="cerrarMenu()"></div>

<div id="side-menu" class="side-menu">
  <div class="close-btn" onclick="cerrarMenu()">✕</div>

  <a href="index.html">Inicio</a>
  <a href="playeras.html">Playeras</a>
</div>

 
</header>

<section class="grid">

  <div class="item">
    <img src="https://via.placeholder.com/300">
    <p>Sudadera Bragado</p>
    <span>$1200 MXN</span>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/300">
    <p>Playera Bragado</p>
    <span>$600 MXN</span>
  </div>

</section>
<script>
function abrirMenu() {
  document.getElementById("side-menu").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function cerrarMenu() {
  document.getElementById("side-menu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
</script>
</body>
</html>
